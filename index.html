<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic OS - Tactical Matrix Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        #matrix-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: #222;
            overflow: hidden;
        }

        .quadrant {
            background-color: #000;
            position: relative;
            display: grid; 
            overflow: hidden;
        }

        .quadrant-label {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 500;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            font-size: 7px;
            font-weight: 900;
            padding: 2px 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .planet {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            padding: 2px;
        }

        .planet:active { filter: brightness(1.6); transform: scale(0.98); }

        .planet-glow {
            box-shadow: inset 0 0 30px rgba(16, 185, 129, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        /* 黄金のオーラ：チェックされたマスの周囲 */
        .planet-checked {
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.8), inset 0 0 15px rgba(250, 204, 21, 0.4) !important;
            z-index: 10;
            border: 1px solid rgba(250, 204, 21, 0.6);
        }

        #side-panel {
            display: none; 
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.35); 
            backdrop-filter: blur(6px); 
            -webkit-backdrop-filter: blur(6px);
            z-index: 999999; 
            align-items: center;
            justify-content: center;
            padding: 12px;
            right: 0;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease;
        }

        #side-panel.open { 
            display: flex;
            transform: translateX(0);
        }

        .panel-content {
            /* 背景色の透明度を0.7に調整し、カテゴリ色をはっきりさせる */
            background: rgba(20, 20, 20, 0.7); 
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            padding: 20px;
            max-height: 96vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            transition: background-color 0.4s ease;
        }

        .form-body {
            overflow-y: auto;
            scrollbar-width: none;
            flex-grow: 1;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #555;
            font-size: 10px;
            font-weight: 900;
            padding: 8px 0;
            width: 18%;
            border-radius: 4px;
            text-align: center;
        }
        
        .filter-btn.active { background-color: #ffffff !important; color: #000000 !important; border-color: #fff !important; }

        #fab-add {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 500000;
            width: 68px;
            height: 68px;
            background: #10b981; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        #sync-status-msg {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            margin-top: 6px;
            min-height: 24px;
            line-height: 1.2;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <header class="z-[1000]">
        <div class="p-3 flex justify-between items-center gap-2">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Search Strategic Matrix..." 
                       oninput="render()"
                       class="w-full bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-[12px] focus:border-emerald-500/50 outline-none">
            </div>
            <button onclick="fetchFromGAS()" id="global-fetch-btn" class="p-2 bg-white/5 rounded-full text-emerald-400 hover:bg-white/10" title="Cloud Refresh">
                <i data-lucide="cloud-download" class="w-5 h-5"></i>
            </button>
            <button onclick="exportJSON()" class="p-2 bg-white/5 rounded-full text-gray-400"><i data-lucide="database" class="w-5 h-5"></i></button>
        </div>
        
        <div class="px-3 pb-1 flex justify-between items-center" id="filter-bar">
            <button onclick="handleFilterDays(0, this)" class="filter-btn active">ALL</button>
            <button onclick="handleFilterDays(30, this)" class="filter-btn">30D</button>
            <button onclick="handleFilterDays(60, this)" class="filter-btn">60D</button>
            <button onclick="handleFilterDays(180, this)" class="filter-btn">180D</button>
            <button onclick="handleFilterDays(365, this)" class="filter-btn">DORM</button>
        </div>

        <div class="px-3 pb-3 flex justify-between items-center gap-1" id="cat-filter-bar">
            <button onclick="handleFilterCategory('ALL', this)" class="filter-btn cat-btn active" style="width: 23%;">CAT ALL</button>
            <button onclick="handleFilterCategory('FOCUS', this)" class="filter-btn cat-btn" style="width: 23%;">FOCUS</button>
            <button onclick="handleFilterCategory('Customer', this)" class="filter-btn cat-btn" style="width: 23%;">CUSTOMER</button>
            <button onclick="handleFilterCategory('Partner', this)" class="filter-btn cat-btn" style="width: 23%;">PARTNER</button>
        </div>
    </header>

    <main id="matrix-container">
        <div class="quadrant" id="q-4" data-level="4"><div class="quadrant-label">LV4 Strategic Focus</div></div>
        <div class="quadrant" id="q-3" data-level="3"><div class="quadrant-label">LV3 High Growth</div></div>
        <div class="quadrant" id="q-2" data-level="2"><div class="quadrant-label">LV2 Standard Asset</div></div>
        <div class="quadrant" id="q-1" data-level="1"><div class="quadrant-label">LV1 Cold Target</div></div>
    </main>

    <button id="fab-add" onclick="prepareNewContact()">
        <i data-lucide="plus" class="w-10 h-10 text-white pointer-events-none"></i>
    </button>

    <div id="side-panel" onclick="if(event.target === this) closePanel()">
        <div class="panel-content" id="panel-box" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="panel-title" class="text-base font-black uppercase tracking-tighter text-emerald-400">Tactical Intel</h2>
                <!-- ターゲット・フォーカス・チェック -->
                <button id="edit-check" onclick="toggleLocalCheck()" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 transition-all">
                   <div id="check-icon-circle" class="w-4 h-4 rounded-full border-2 border-gray-600 flex items-center justify-center">
                       <div id="check-icon-dot" class="w-2 h-2 rounded-full bg-yellow-400 opacity-0 transition-opacity"></div>
                   </div>
                   <span class="text-[9px] font-black text-gray-400 tracking-widest uppercase">Target Focus</span>
                </button>
                <button onclick="closePanel()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-gray-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="form-body space-y-4">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Company Name</label>
                    <input type="text" id="edit-name" class="w-full bg-transparent border-b border-white/10 p-0 py-1 text-base font-black text-white outline-none">
                </div>

                <div class="pt-2 border-t border-white/5">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Stakeholders</label>
                        <button onclick="addMoon()" class="text-[9px] text-emerald-400 font-black">+ ADD</button>
                    </div>
                    <div id="moon-list" class="space-y-2"></div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-white/5">
                    <div>
                        <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Potential Rank</label>
                        <select id="edit-potential" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-emerald-400 font-bold text-xs outline-none">
                            <option value="4">LV4 Strategic</option>
                            <option value="3">LV3 High</option>
                            <option value="2">LV2 Standard</option>
                            <option value="1">LV1 Cold</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Category</label>
                        <select id="edit-category" onchange="syncPanelColor(this.value)" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-white text-xs outline-none">
                            <option value="FOCUS">FOCUS</option>
                            <option value="Customer">Customer</option>
                            <option value="Partner">Partner</option>
                            <option value="Vendor">Vendor</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Last Contact Date</label>
                        <button onclick="setTodayDate()" class="bg-emerald-500/20 border border-emerald-500/50 px-3 py-1 rounded-full text-emerald-400 text-[10px] font-black active:scale-95 transition-all">TODAY</button>
                    </div>
                    <input type="date" id="edit-last-date" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-white text-xs outline-none">
                </div>
                
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Intel Log (Repo)</label>
                    <textarea id="edit-memo" rows="3" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-xs text-gray-300 outline-none leading-relaxed"></textarea>
                </div>
                
                <div class="flex flex-col gap-1 pt-2">
                    <button id="sync-btn" onclick="confirmSync()" class="w-full py-4 rounded-xl font-black text-white uppercase tracking-widest text-xs shadow-lg transition-all border border-white/10">Sync Strategic Asset</button>
                    <div id="sync-status-msg"></div>
                    <button id="delete-btn" onclick="deleteContact()" class="bg-red-500/80 text-white font-black py-2 rounded-lg text-[10px] mt-2">DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 最新URLを埋め込み ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwA5n05E6NfVojS_B1Twab9-T_rKQCR_tkIn_qS9yOq02BL4QmP6dm6Iq6q_A02PsoK/exec"; 
        const STORAGE_KEY = 'StrategicOS_Master_Core_2026_Final_Rev1';

        let contacts = [];
        let activeDaysFilter = 0;
        let activeCategoryFilter = 'ALL';
        let currentId = null;
        let isAddingNew = false;
        let tempMoons = [];
        let tempChecked = false;

        function init() {
            safeLucide();
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) { contacts = JSON.parse(stored); render(); }
            fetchFromGAS();
            document.getElementById('matrix-container').addEventListener('click', (e) => {
                const planet = e.target.closest('.planet');
                if (planet && planet.dataset.id) { openPanel(planet.dataset.id); }
            });
        }

        async function fetchFromGAS() {
            if (!GAS_URL) return;
            const fetchBtn = document.getElementById('global-fetch-btn');
            const statusEl = document.getElementById('sync-status-msg');
            if(fetchBtn) fetchBtn.classList.add('animate-spin');
            try {
                const response = await fetch(GAS_URL + "?action=get"); 
                const cloudData = await response.json();
                if (cloudData && cloudData.status === 'success' && cloudData.payload) {
                    contacts = cloudData.payload;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
                    render();
                }
            } catch (e) {
                if(statusEl) { statusEl.innerText = "COMMAND: SYNC ERROR"; statusEl.style.color = "#ef4444"; }
            } finally { if(fetchBtn) fetchBtn.classList.remove('animate-spin'); }
        }

        async function saveToGAS(data) {
            const statusEl = document.getElementById('sync-status-msg');
            if (!GAS_URL || !statusEl) return;
            statusEl.innerText = "COMMAND: UPLOADING..."; statusEl.style.color = "#fbbf24";
            try {
                await fetch(GAS_URL, {
                    method: 'POST', mode: 'no-cors', cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'sync', payload: data, timestamp: new Date().toISOString() })
                });
                statusEl.innerText = "COMMAND: SYNC SUCCESSFUL"; statusEl.style.color = "#10b981";
                setTimeout(() => statusEl.innerText = "", 3000);
            } catch (e) { statusEl.innerText = "COMMAND: UPLOAD ERROR"; statusEl.style.color = "#ef4444"; }
        }

        function render() {
            const quads = { 4: 'q-4', 3: 'q-3', 2: 'q-2', 1: 'q-1' };
            Object.values(quads).forEach(id => {
                const q = document.getElementById(id);
                q.querySelectorAll('.planet').forEach(t => t.remove());
            });
            let list = [...contacts];
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            if (searchVal) list = list.filter(c => c.name.toLowerCase().includes(searchVal));
            if (activeDaysFilter > 0) {
                list = list.filter(c => ((new Date() - new Date(c.lastContact))/86400000) >= activeDaysFilter);
            }
            if (activeCategoryFilter !== 'ALL') list = list.filter(c => c.category === activeCategoryFilter);

            const grouped = { 4: [], 3: [], 2: [], 1: [] };
            list.forEach(c => { if(grouped[c.potential]) grouped[c.potential].push(c); });

            Object.keys(grouped).forEach(level => {
                const container = document.getElementById(quads[level]);
                const items = grouped[level];
                if (items.length === 0) return;
                container.style.gridTemplateColumns = `repeat(${Math.ceil(Math.sqrt(items.length))}, 1fr)`;
                items.forEach(c => {
                    const div = document.createElement('div');
                    const diff = (new Date() - new Date(c.lastContact)) / 86400000;
                    div.className = `planet ${c.category === 'FOCUS' ? 'planet-glow' : ''} ${c.category === 'Partner' ? 'planet-partner' : ''}`;
                    if (c.checked) div.classList.add('planet-checked');
                    div.style.backgroundColor = getCategoryColor(c.category, diff);
                    div.dataset.id = String(c.id);
                    let textColor = '#fff';
                    if (c.category === 'FOCUS' || c.category === 'Partner' || c.category === 'Customer') {
                        if (diff < 30) textColor = '#000'; 
                    }
                    const moonList = (c.moons || []).map(m => m.name).join(' / ');
                    div.innerHTML = `
                        <div class="text-[10px] font-black text-center px-1 uppercase leading-none pointer-events-none mb-0.5" style="color: ${textColor}">${c.name}</div>
                        <div class="text-[7.5px] font-medium text-center px-1 opacity-80 leading-none pointer-events-none" style="color: ${textColor}">${moonList}</div>
                    `;
                    container.appendChild(div);
                });
            });
            safeLucide();
        }

        function getCategoryColor(cat, diff) {
            if (cat === 'FOCUS') {
                if (diff < 30)  return '#fde047'; if (diff < 60)  return '#eab308';
                if (diff < 180) return '#ca8a04'; if (diff < 365) return '#a16207';
                return '#713f12';
            }
            if (cat === 'Partner') {
                if (diff < 30)  return '#d8b4fe'; if (diff < 60)  return '#a855f7';
                if (diff < 180) return '#7e22ce'; if (diff < 365) return '#581c87';
                return '#2e1065';
            }
            if (cat === 'Vendor') {
                if (diff < 30)  return '#3b82f6'; if (diff < 60)  return '#1e40af';
                if (diff < 180) return '#1e3a8a'; if (diff < 365) return '#172554';
                return '#0f172a';
            }
            if (diff < 30)  return '#10b981'; if (diff < 60)  return '#059669';
            if (diff < 180) return '#065f46'; if (diff < 365) return '#022c22';
            return '#1e293b'; 
        }

        function syncPanelColor(cat) {
            const panel = document.getElementById('panel-box');
            const syncBtn = document.getElementById('sync-btn');
            let bgColor = 'rgba(20, 20, 20, 0.7)';
            let btnGradient = 'linear-gradient(135deg, #10b981, #059669)';

            if (cat === 'FOCUS') {
                bgColor = 'rgba(234, 179, 8, 0.7)';
                btnGradient = 'linear-gradient(135deg, #fde047, #ca8a04)';
            } else if (cat === 'Partner') {
                bgColor = 'rgba(168, 85, 247, 0.7)';
                btnGradient = 'linear-gradient(135deg, #d8b4fe, #7e22ce)';
            } else if (cat === 'Vendor') {
                bgColor = 'rgba(30, 58, 138, 0.8)';
                btnGradient = 'linear-gradient(135deg, #3b82f6, #1e3a8a)';
            } else if (cat === 'Customer') {
                bgColor = 'rgba(16, 185, 129, 0.7)';
                btnGradient = 'linear-gradient(135deg, #10b981, #059669)';
            }
            panel.style.backgroundColor = bgColor;
            syncBtn.style.background = btnGradient;
        }

        function toggleLocalCheck() { tempChecked = !tempChecked; updateCheckUI(); }
        function updateCheckUI() {
            const dot = document.getElementById('check-icon-dot');
            const circle = document.getElementById('check-icon-circle');
            const label = document.querySelector('#edit-check span');
            if (tempChecked) { dot.style.opacity = '1'; circle.style.borderColor = '#facc15'; label.style.color = '#facc15'; }
            else { dot.style.opacity = '0'; circle.style.borderColor = '#4b5563'; label.style.color = '#4b5563'; }
        }

        function setTodayDate() { document.getElementById('edit-last-date').value = new Date().toISOString().split('T')[0]; }

        function openPanel(id) {
            const c = contacts.find(x => String(x.id) === String(id));
            if (!c) return;
            isAddingNew = false; currentId = String(id);
            document.getElementById('edit-name').value = c.name;
            document.getElementById('edit-potential').value = c.potential;
            document.getElementById('edit-category').value = c.category;
            document.getElementById('edit-last-date').value = c.lastContact;
            document.getElementById('edit-memo').value = c.memo || '';
            document.getElementById('delete-btn').style.display = 'block';
            tempChecked = !!c.checked; updateCheckUI(); syncPanelColor(c.category);
            tempMoons = JSON.parse(JSON.stringify(c.moons || []));
            renderMoons();
            const p = document.getElementById('side-panel');
            p.style.display = 'flex'; setTimeout(() => p.classList.add('open'), 10);
        }

        function prepareNewContact() {
            isAddingNew = true; currentId = 'c' + Date.now();
            document.getElementById('edit-name').value = '';
            document.getElementById('edit-potential').value = 4;
            const defaultCat = 'Customer';
            document.getElementById('edit-category').value = defaultCat;
            document.getElementById('edit-last-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('edit-memo').value = '';
            document.getElementById('delete-btn').style.display = 'none';
            tempChecked = false; updateCheckUI(); syncPanelColor(defaultCat);
            tempMoons = []; renderMoons();
            const p = document.getElementById('side-panel');
            p.style.display = 'flex'; setTimeout(() => p.classList.add('open'), 10);
        }

        function confirmSync() {
            const data = {
                id: currentId, name: document.getElementById('edit-name').value,
                potential: parseInt(document.getElementById('edit-potential').value),
                category: document.getElementById('edit-category').value,
                lastContact: document.getElementById('edit-last-date').value,
                memo: document.getElementById('edit-memo').value,
                moons: tempMoons, checked: tempChecked 
            };
            if(!data.name) return;
            if (isAddingNew) contacts.push(data);
            else { const idx = contacts.findIndex(x => String(x.id) === currentId); if (idx !== -1) contacts[idx] = data; }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
            saveToGAS(contacts); render(); closePanel();
        }

        function renderMoons() {
            const list = document.getElementById('moon-list'); list.innerHTML = '';
            tempMoons.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'flex gap-2 items-center bg-white/5 p-2 rounded-xl border border-white/5';
                div.innerHTML = `
                    <input type="text" value="${m.name}" oninput="tempMoons[${i}].name = this.value" class="flex-1 bg-transparent text-xs text-white font-bold outline-none">
                    <button onclick="tempMoons.splice(${i}, 1); renderMoons();" class="text-red-500/40"><i data-lucide="minus-circle" class="w-3 h-3"></i></button>
                `;
                list.appendChild(div);
            });
            safeLucide();
        }
        function addMoon() { tempMoons.push({name: 'New Person'}); renderMoons(); }
        function closePanel() { 
            const p = document.getElementById('side-panel');
            p.classList.remove('open'); setTimeout(() => { if(!p.classList.contains('open')) p.style.display = 'none'; }, 300);
        }
        function handleFilterDays(d, b) { activeDaysFilter = d; document.querySelectorAll('#filter-bar .filter-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); }
        function handleFilterCategory(c, b) { activeCategoryFilter = c; document.querySelectorAll('#cat-filter-bar .cat-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); }
        function deleteContact() { if(!confirm('Discard?')) return; contacts = contacts.filter(x => String(x.id) !== currentId); localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts)); saveToGAS(contacts); render(); closePanel(); }
        function safeLucide() { try { lucide.createIcons(); } catch(e){} }
        function exportJSON() { const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(contacts)); const a = document.createElement('a'); a.href = data; a.download = `strat_quad_${Date.now()}.json`; a.click(); }
        window.onload = init;
    </script>
</body>
</html>
