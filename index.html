<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic OS - Tactical Matrix Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        :root {
            --em-fresh: #064e3b;
            --em-30:    #059669;
            --em-60:    #10b981;
            --em-180:   #34d399;
            --em-bright:#6ee7b7;
            --bg-dark: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー：背景透過ブラー */
        header {
            background-color: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        /* 四象限レイアウト：画面全体を4等分 */
        #matrix-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: #222;
            overflow: hidden;
        }

        .quadrant {
            background-color: #000;
            position: relative;
            display: grid; 
            overflow: hidden;
        }

        .quadrant-label {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 500;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            font-size: 7px;
            font-weight: 900;
            padding: 2px 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        /* 均等タイル：会社名と担当者を配置 */
        .planet {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.08);
            transition: filter 0.2s, background-color 0.3s;
            overflow: hidden;
            padding: 2px;
        }

        .planet:active { filter: brightness(1.6); }

        .planet-glow {
            box-shadow: inset 0 0 25px rgba(16, 185, 129, 0.15), inset 0 0 0 1px rgba(16, 185, 129, 0.25);
        }

        /* PARTNER：紫グラデーション */
        .planet-partner {
            background: linear-gradient(135deg, #6b21a8, #3b0764) !important;
            box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.2), inset 0 0 0 0.5px rgba(255,255,255,0.15) !important;
        }

        /* 統合編集センター：超高透明度センターパネル */
        #side-panel {
            display: none; 
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.35); /* 透明度：高い */
            backdrop-filter: blur(6px); /* ぼかし：薄い */
            -webkit-backdrop-filter: blur(6px);
            z-index: 999999; 
            align-items: center;
            justify-content: center;
            padding: 12px;
            right: 0;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #side-panel.open { 
            display: flex;
            transform: translateX(0);
        }

        .panel-content {
            background: rgba(20, 20, 20, 0.45); /* パネル自体の透明度：高い */
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            padding: 20px;
            max-height: 96vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .form-body {
            overflow-y: auto;
            scrollbar-width: none;
            flex-grow: 1;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #555;
            font-size: 10px;
            font-weight: 900;
            padding: 8px 0;
            width: 18%;
            border-radius: 4px;
            text-align: center;
        }
        
        .filter-btn.active[data-days="0"] { background-color: #444 !important; color: white !important; }
        .filter-btn.active[data-days="30"] { background-color: var(--em-30) !important; color: white !important; }
        .filter-btn.active[data-days="60"] { background-color: var(--em-60) !important; color: white !important; }
        .filter-btn.active[data-days="180"] { background-color: var(--em-180) !important; color: black !important; }
        .filter-btn.active[data-days="365"] { background-color: var(--em-bright) !important; color: black !important; }

        .cat-btn.active {
            background-color: var(--em-60) !important;
            color: black !important;
            border-color: white !important;
        }

        /* 輝くFABボタン */
        #fab-add {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 500000;
            width: 68px;
            height: 68px;
            background: #10b981; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 攻めのグロウ */
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.7), 0 0 50px rgba(16, 185, 129, 0.4), 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            filter: brightness(1.3); 
            transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
        }
        #fab-add:active { transform: scale(0.9) rotate(90deg); filter: brightness(1.6); }

        /* 削除ボタン：DELETE表記 */
        #delete-btn {
            background-color: #ef4444;
            color: white;
            font-weight: 900;
            padding: 12px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.2em;
            margin-top: 8px;
            transition: all 0.2s;
            border: none;
        }
        #delete-btn:active { background-color: #b91c1c; transform: scale(0.96); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <header class="z-[1000]">
        <div class="p-3 flex justify-between items-center gap-2">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Search Strategic Assets..." 
                       oninput="handleSearch(this.value)"
                       class="w-full bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-[12px] focus:border-emerald-500/50 outline-none">
            </div>
            <button onclick="exportJSON()" class="p-2 bg-white/5 rounded-full text-gray-400"><i data-lucide="database" class="w-5 h-5"></i></button>
        </div>
        
        <div class="px-3 pb-1 flex justify-between items-center" id="filter-bar">
            <button onclick="handleFilterDays(0, this)" data-days="0" class="filter-btn active">ALL</button>
            <button onclick="handleFilterDays(30, this)" data-days="30" class="filter-btn">30D</button>
            <button onclick="handleFilterDays(60, this)" data-days="60" class="filter-btn">60D</button>
            <button onclick="handleFilterDays(180, this)" data-days="180" class="filter-btn">180D</button>
            <button onclick="handleFilterDays(365, this)" data-days="365" class="filter-btn">DORM</button>
        </div>

        <div class="px-3 pb-3 flex justify-between items-center gap-1" id="cat-filter-bar">
            <button onclick="handleFilterCategory('ALL', this)" class="filter-btn cat-btn active" style="width: 23%;">CAT ALL</button>
            <button onclick="handleFilterCategory('FOCUS', this)" class="filter-btn cat-btn" style="width: 23%;">FOCUS</button>
            <button onclick="handleFilterCategory('Customer', this)" class="filter-btn cat-btn" style="width: 23%;">CUSTOMER</button>
            <button onclick="handleFilterCategory('Partner', this)" class="filter-btn cat-btn" style="width: 23%;">PARTNER</button>
        </div>
    </header>

    <main id="matrix-container">
        <div class="quadrant" id="q-4"><div class="quadrant-label">LV4 Strategic Focus</div></div>
        <div class="quadrant" id="q-3"><div class="quadrant-label">LV3 High Growth</div></div>
        <div class="quadrant" id="q-2"><div class="quadrant-label">LV2 Standard Asset</div></div>
        <div class="quadrant" id="q-1"><div class="quadrant-label">LV1 Cold Target</div></div>
    </main>

    <button id="fab-add" onclick="prepareNewContact()">
        <i data-lucide="plus" class="w-10 h-10 text-white pointer-events-none"></i>
    </button>

    <!-- 統合戦術センター -->
    <div id="side-panel" onclick="if(event.target === this) closePanel()">
        <div class="panel-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="panel-title" class="text-base font-black uppercase tracking-tighter text-emerald-400">Tactical Intel</h2>
                <button onclick="closePanel()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-gray-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <div class="form-body space-y-4">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Entity Name</label>
                    <input type="text" id="edit-name" class="w-full bg-transparent border-b border-white/10 p-0 py-1 text-base font-black text-white focus:border-emerald-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Potential</label>
                        <select id="edit-potential" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-emerald-400 font-bold outline-none text-xs">
                            <option value="4">LV4 Strategic</option>
                            <option value="3">LV3 High</option>
                            <option value="2">LV2 Standard</option>
                            <option value="1">LV1 Cold</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Category</label>
                        <select id="edit-category" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-white outline-none text-xs">
                            <option value="FOCUS">FOCUS</option>
                            <option value="Customer">Customer</option>
                            <option value="Partner">Partner</option>
                            <option value="Vendor">Vendor</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Last Contact</label>
                    <input type="date" id="edit-last-date" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-white outline-none text-xs">
                </div>

                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">Intel Repo</label>
                    <textarea id="edit-memo" rows="3" class="w-full bg-white/10 border border-white/10 rounded-lg p-2 text-xs text-gray-300 outline-none leading-relaxed"></textarea>
                </div>

                <div class="pt-2 border-t border-white/5">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Stakeholders</label>
                        <button onclick="addMoon()" class="text-[9px] text-emerald-400 font-black">+ ADD</button>
                    </div>
                    <div id="moon-list" class="space-y-2"></div>
                </div>

                <div class="flex flex-col gap-2 pt-2">
                    <button onclick="confirmSync()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-white uppercase tracking-widest text-xs shadow-lg transition-all">Sync Strategy</button>
                    <button id="delete-btn" onclick="deleteContact()">DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- GAS Sync Config (GASのデプロイURLをここに貼ってください) ---
        const GAS_URL = ""; 

        // --- Core Strategic Data (Based on 506.png) ---
        const DEFAULT_DATA = [
            // Potentials map: 4/5 -> 4, 3 -> 3, 2 -> 2, 1 -> 1
            { id: 'c1', name: 'HBA', category: 'Partner', potential: 3, lastContact: '2026-02-24', memo: 'Partner案件検証。', moons: [{name: '伊藤s'}, {name: '橋本J'}] },
            { id: 'c2', name: 'HBA', category: 'FOCUS', potential: 3, lastContact: '2026-02-24', memo: '重点顧客。', moons: [{name: '高橋取締役'}] },
            { id: 'c3', name: 'JSD', category: 'FOCUS', potential: 3, lastContact: '2026-02-24', memo: '戦術的アプローチ。', moons: [{name: '柴田s'}, {name: '駒子s'}] },
            { id: 'c4', name: 'NTTD', category: 'Partner', potential: 3, lastContact: '2026-02-10', memo: '広域連携。', moons: [{name: '庄子s'}, {name: '鈴木K'}, {name: '中野谷s'}, {name: '澤野K'}] },
            { id: 'c5', name: 'OTS', category: 'Partner', potential: 3, lastContact: '2026-02-09', memo: 'チャネル。', moons: [{name: '田邊s'}] },
            { id: 'c6', name: 'PFU', category: 'Partner', potential: 3, lastContact: '2026-02-04', memo: 'ソリューション。', moons: [{name: '谷口K'}] },
            { id: 'c7', name: 'アインHD', category: 'FOCUS', potential: 3, lastContact: '2025-06-26', memo: 'GreenLake提案。', moons: [{name: '滝原s'}] },
            { id: 'c8', name: 'ホクレン', category: 'Customer', potential: 3, lastContact: '2025-12-26', memo: '既存。', moons: [{name: '高橋K'}] },
            { id: 'c9', name: '北海道ガス', category: 'FOCUS', potential: 3, lastContact: '2025-09-05', memo: 'DX推進。', moons: [{name: '西村B'}] },
            { id: 'c10', name: '北海道警察', category: 'FOCUS', potential: 3, lastContact: '2026-02-04', memo: '治安基盤。', moons: [{name: '石亀s'}] },
            { id: 'c11', name: '北海道庁', category: 'FOCUS', potential: 3, lastContact: '2026-02-04', memo: '公共インフラ。', moons: [{name: '山中s'}] },
            { id: 'c12', name: 'HARP', category: 'FOCUS', potential: 4, lastContact: '2026-02-05', memo: '重点行政SaaS。', moons: [{name: '川上s'}] },
            { id: 'c13', name: '札幌市', category: 'FOCUS', potential: 4, lastContact: '2025-12-12', memo: '政令指定都市。', moons: [{name: '坪谷s'}] },
            { id: 'c14', name: 'ツルハHD', category: 'FOCUS', potential: 4, lastContact: '2026-02-18', memo: 'リテールDX。', moons: [{name: '川添s'}] },
            { id: 'c15', name: 'JRH', category: 'FOCUS', potential: 4, lastContact: '2025-12-26', memo: '交通基盤。', moons: [{name: '福士B'}] },
            { id: 'c16', name: 'SEC', category: 'FOCUS', potential: 4, lastContact: '2025-11-13', memo: '情報システム。', moons: [{name: '藤内s'}] },
            { id: 'c17', name: 'サツドラ', category: 'FOCUS', potential: 3, lastContact: '2025-11-11', memo: '地域経済。', moons: [{name: '佐々木CIO'}] },
            { id: 'c18', name: '北大', category: 'FOCUS', potential: 3, lastContact: '2026-02-06', memo: '研究機関。', moons: [{name: '財原s'}] },
            { id: 'c19', name: 'ニトリ', category: 'Customer', potential: 2, lastContact: '2026-01-16', memo: 'グローバルSCM。', moons: [{name: '舘岡s'}, {name: '中谷s'}] },
            { id: 'c20', name: 'RJ', category: 'Customer', potential: 2, lastContact: '2025-12-26', memo: '顧客。', moons: [{name: '三島s'}] },
            { id: 'c21', name: '北星学園大学', category: 'Customer', potential: 3, lastContact: '2026-02-17', memo: '学術。', moons: [{name: '岩本K'}] },
            { id: 'c22', name: 'RITS', category: 'Customer', potential: 1, lastContact: '2026-01-29', memo: '新規開拓。', moons: [{name: '上芝s'}] }
        ];

        const STORAGE_KEY = 'ro_v2026_matrix_final_v12_clear';

        let contacts = (() => {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : DEFAULT_DATA;
            } catch (e) { return DEFAULT_DATA; }
        })();

        let currentId = null;
        let isAddingNew = false;
        let activeFilterDays = 0;
        let activeFilterCategory = 'ALL';
        let tempMoons = [];

        const palette = { 0: '#064e3b', 30: '#059669', 60: '#10b981', 180: '#34d399', 365: '#6ee7b7' };

        function init() {
            safeLucide();
            render();
        }

        function safeLucide() {
            try { if (typeof lucide !== 'undefined') lucide.createIcons(); } catch (e) {}
        }

        // GASへの送信
        async function saveToGAS(data) {
            if (!GAS_URL) return;
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'sync',
                        payload: data,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (e) {
                console.warn("GAS Sync Failure:", e);
            }
        }

        function saveToStorage() {
            try { 
                localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts)); 
                saveToGAS(contacts); 
            } catch (e) {}
        }

        function getEmerald(date) {
            if(!date) return palette[0];
            const diff = (new Date() - new Date(date)) / 86400000;
            if (diff >= 365) return palette[365];
            if (diff >= 180) return palette[180];
            if (diff >= 60)  return palette[60];
            if (diff >= 30)  return palette[30];
            return palette[0];
        }

        function render() {
            const quads = {
                4: document.getElementById('q-4'),
                3: document.getElementById('q-3'),
                2: document.getElementById('q-2'),
                1: document.getElementById('q-1')
            };

            Object.values(quads).forEach(q => {
                const tiles = q.querySelectorAll('.planet');
                tiles.forEach(t => t.remove());
            });
            
            let list = [...contacts];
            if (activeFilterDays > 0) {
                const now = new Date();
                list = list.filter(c => ((now - new Date(c.lastContact)) / 86400000) >= activeFilterDays);
            }
            if (activeFilterCategory !== 'ALL') {
                list = list.filter(c => c.category === activeFilterCategory);
            }

            const grouped = { 4: [], 3: [], 2: [], 1: [] };
            list.forEach(c => { if(grouped[c.potential]) grouped[c.potential].push(c); });

            Object.keys(grouped).forEach(level => {
                const container = quads[level];
                const items = grouped[level];
                const count = items.length;
                if (count === 0) return;

                const cols = Math.ceil(Math.sqrt(count));
                const rows = Math.ceil(count / cols);
                container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                container.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                
                items.forEach(c => {
                    const div = document.createElement('div');
                    let classList = `planet`;
                    if (c.category === 'FOCUS') classList += ' planet-glow';
                    if (c.category === 'Partner') classList += ' planet-partner';
                    div.className = classList;
                    
                    if (c.category !== 'Partner') {
                        div.style.backgroundColor = getEmerald(c.lastContact);
                    }
                    
                    div.setAttribute('onclick', `openPanel('${c.id}')`);
                    
                    const diff = (new Date() - new Date(c.lastContact)) / 86400000;
                    const textColor = (c.category === 'Partner' || diff < 180) ? '#fff' : '#000';
                    const moonList = c.moons.map(m => m.name).join(' / ');
                    
                    div.innerHTML = `
                        <div class="text-[10px] font-black text-center px-1 uppercase leading-none pointer-events-none mb-0.5" style="color: ${textColor}">${c.name}</div>
                        <div class="text-[7.5px] font-medium text-center px-1 opacity-70 leading-none pointer-events-none" style="color: ${textColor}">${moonList}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        function handleFilterDays(days, btn) {
            activeFilterDays = days;
            document.querySelectorAll('#filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function handleFilterCategory(cat, btn) {
            activeFilterCategory = cat;
            document.querySelectorAll('#cat-filter-bar .cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function handleSearch(val) {
            const term = val.toLowerCase();
            if (!term) return;
            const found = contacts.find(c => c.name.toLowerCase().includes(term));
            if (found) openPanel(found.id);
        }

        function openPanel(id) {
            const c = contacts.find(x => String(x.id) === String(id));
            if (!c) return;
            isAddingNew = false;
            currentId = String(id);
            document.getElementById('panel-title').innerText = 'Strategic Intel';
            document.getElementById('edit-name').value = c.name;
            document.getElementById('edit-potential').value = c.potential;
            document.getElementById('edit-category').value = c.category;
            document.getElementById('edit-last-date').value = c.lastContact;
            document.getElementById('edit-memo').value = c.memo || '';
            document.getElementById('delete-btn').style.display = 'block';
            tempMoons = JSON.parse(JSON.stringify(c.moons || []));
            renderMoons();
            const panel = document.getElementById('side-panel');
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('open'), 10);
            safeLucide();
        }

        function prepareNewContact() {
            isAddingNew = true;
            currentId = 'c' + Date.now();
            document.getElementById('panel-title').innerText = 'New Asset Intel';
            document.getElementById('edit-name').value = ''; 
            document.getElementById('edit-potential').value = 4;
            document.getElementById('edit-category').value = 'Customer';
            document.getElementById('edit-last-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('edit-memo').value = '';
            document.getElementById('delete-btn').style.display = 'none';
            tempMoons = [];
            renderMoons();
            const panel = document.getElementById('side-panel');
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('open'), 10);
            safeLucide();
        }

        function confirmSync() {
            const name = document.getElementById('edit-name').value;
            if(!name) { alert("会社名を入力してください。"); return; }
            const data = {
                id: currentId,
                name: name,
                potential: parseInt(document.getElementById('edit-potential').value),
                category: document.getElementById('edit-category').value,
                lastContact: document.getElementById('edit-last-date').value,
                memo: document.getElementById('edit-memo').value,
                moons: tempMoons
            };
            if (isAddingNew) contacts.push(data);
            else {
                const idx = contacts.findIndex(x => String(x.id) === currentId);
                if (idx !== -1) contacts[idx] = data;
            }
            saveToStorage(); render(); closePanel();
        }

        function closePanel() { 
            const panel = document.getElementById('side-panel');
            panel.classList.remove('open'); 
            setTimeout(() => { if (!panel.classList.contains('open')) panel.style.display = 'none'; }, 300);
            currentId = null; 
        }

        function deleteContact() {
            if (!confirm('Discard profile?')) return;
            contacts = contacts.filter(x => String(x.id) !== currentId);
            saveToStorage(); render(); closePanel();
        }

        function renderMoons() {
            const list = document.getElementById('moon-list');
            list.innerHTML = '';
            tempMoons.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'flex gap-2 items-center bg-white/5 p-2 rounded-xl border border-white/5';
                div.innerHTML = `
                    <div class="w-1 h-1 rounded-full bg-emerald-500"></div>
                    <input type="text" value="${m.name}" oninput="tempMoons[${i}].name = this.value" class="flex-1 bg-transparent text-xs text-white font-bold outline-none">
                    <button onclick="tempMoons.splice(${i}, 1); renderMoons();" class="text-red-500/40"><i data-lucide="minus-circle" class="w-3 h-3"></i></button>
                `;
                list.appendChild(div);
            });
            safeLucide();
        }

        function addMoon() { tempMoons.push({name: 'New Person'}); renderMoons(); }

        function exportJSON() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(contacts));
            const a = document.createElement('a'); a.href = data; a.download = `strat_quad_${Date.now()}.json`; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
